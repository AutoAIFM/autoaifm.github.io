description: >
  Automated artificial intelligence (AutoAI) comprises meta-algorithmic methods that improve performance by, for example, automatically selecting, configuring, designing or explaining AI algorithms for a given task or problem distribution.
  This workshop focuses on the intersection of AutoAI and foundation models.
