- name: Carola Doerr
  affiliation: CNRS research director at Sorbonne University, France
  bio: >
    CNRS research director at Sorbonne University, France. Carola's main research activities are in the analysis of black-box optimisation algorithms, both by mathematical and by empirical means. She is associate editor of IEEE Transactions on Evolutionary Computation, ACM Transactions on Evolutionary Learning and Optimisation (TELO), and the Evolutionary Computation journal.
