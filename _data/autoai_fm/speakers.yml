- name: Tome Eftimov
  affiliation: Jožef Stefan Institute, Slovenia
  bio: >
    Senior researcher at the Computer Systems Department of the Jožef Stefan Institute, Slovenia. Tome is vice-chair of the IEEE Computational Intelligence Society’s Task Force on Automated Algorithm Design, Configuration, and Selection. His research encompasses statistical data analysis, natural language processing, machine learning, and information theory.
