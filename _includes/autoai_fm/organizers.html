<!-- Organizers Section -->
<section id="organizers" class="bg-light-gray">
    <div class="container">
        <div class="row">
            <div class="col-lg-12 text-center">
                <h2 class="section-heading">Organizers</h2>
            </div>
        </div>
        <div class="row">
            {% for organizer in site.data.autoai_fm.organizers %}
            <div class="col-sm-6 organizer-item" style="margin-bottom: 30px;">
                <div class="text-center">
                    <img src="https://via.placeholder.com/200" class="img-responsive img-circle"
                        style="margin: 0 auto; width: 200px; height: 200px;" alt="{{ organizer.name }}">
                    <h4>{{ organizer.name }}</h4>
                    <p class="text-muted">{{ organizer.affiliation }}</p>
                    {% if organizer.role %}
                    <p class="text-muted" style="font-weight: bold;">{{ organizer.role }}</p>
                    {% endif %}
                    <ul class="list-inline social-buttons">
                        {% if organizer.website %}
                        <li><a href="{{ organizer.website }}" target="_blank"><i class="fa fa-home"></i></a></li>
                        {% endif %}
                        {% if organizer.email %}
                        <li><a href="mailto:{{ organizer.email }}"><i class="fa fa-envelope"></i></a></li>
                        {% endif %}
                    </ul>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
