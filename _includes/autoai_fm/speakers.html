<!-- Speakers Section -->
<section id="speakers">
    <div class="container">
        <div class="row">
            <div class="col-lg-12 text-center">
                <h2 class="section-heading">Keynote Speakers</h2>
            </div>
        </div>
        <div class="row">
            {% for speaker in site.data.autoai_fm.speakers %}
            <div class="col-sm-6 speaker-item">
                <div class="text-center">
                    {% if speaker.img %}
                    <img src="/css/2017_style/img/{{ speaker.img }}" class="img-responsive img-circle"
                        style="margin: 0 auto; width: 200px; height: 200px;" alt="{{ speaker.name }}">
                    {% endif %}
                    <h4>{{ speaker.name }}</h4>
                    <p class="text-muted">{{ speaker.affiliation }}</p>
                    <p>{{ speaker.bio }}</p>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
