<!-- Speakers Section -->
<section id="speakers">
    <div class="container">
        <div class="row">
            <div class="col-lg-12 text-center">
                <h2 class="section-heading">Keynote Speakers</h2>
            </div>
        </div>
        <div class="row">
            {% for speaker in site.data.autoai_fm.speakers %}
            <div class="col-sm-6 speaker-item">
                <div class="text-center">
                    <h4>{{ speaker.name }}</h4>
                    <p class="text-muted">{{ speaker.affiliation }}</p>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
